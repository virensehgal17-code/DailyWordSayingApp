<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="description" content="Discover a beautiful new word and a cool saying every single day. Expand your vocabulary one word at a time.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Word of the Day">
<meta name="theme-color" content="#0d0d1a">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="manifest" href="./manifest.json">
<title>Word of the Day — Daily Vocabulary & Cool Sayings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="particleCanvas"></canvas>

<!-- Install Banner -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">
    <span class="install-icon">📲</span>
    <span>Install this app on your phone!</span>
  </div>
  <button class="install-btn" id="installBtn" onclick="installApp()">Install</button>
  <button class="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<!-- Main Card -->
<div class="card-container">
  <div class="card" id="card">
    <!-- Header -->
    <div class="card-header">
      <div class="date-label" id="dateLabel"></div>
      <div class="header-right">
        <button class="theme-toggle" id="themeToggle" onclick="toggleThemePicker()" title="Change theme">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.5-.6 1.5-1.5 0-.4-.1-.7-.3-1-.2-.3-.5-.7-.5-1 0-.9.7-1.5 1.5-1.5H16c3.3 0 6-2.7 6-6 0-5.5-4.5-10-10-10z"/><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/></svg>
        </button>
        <div class="streak" id="streak" title="Your streak">🔥 <span id="streakCount">0</span></div>
      </div>
    </div>
    <div class="day-count" id="dayCount"></div>

    <!-- Word Section -->
    <div class="word-section">
      <div class="word-row" id="wordRow" onclick="speakWord()">
        <div class="word" id="word"></div>
        <svg class="speak-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </div>
      <div class="speak-hint">tap word to hear it</div>
      <div class="pronunciation" id="pronunciation"></div>
      <div class="part-of-speech" id="pos"></div>
    </div>

    <div class="divider"></div>

    <!-- Definition -->
    <div class="content-section def-section">
      <div class="section-label">Definition</div>
      <div class="definition" id="definition"></div>
    </div>

    <!-- Example -->
    <div class="content-section example-section">
      <div class="section-label">Example</div>
      <div class="example" id="example"></div>
    </div>

    <div class="divider"></div>

    <!-- Saying -->
    <div class="content-section saying-section">
      <div class="section-label">✨ Saying of the Day</div>
      <div class="saying" id="saying"></div>
      <div class="saying-context" id="sayingContext"></div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="action-btn" id="shareBtn" onclick="shareWord()" title="Share">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        Share
      </button>
      <button class="action-btn" id="notifBtn" onclick="toggleNotifications()" title="Notifications">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="notifLabel">Remind Me</span>
      </button>
    </div>

    <!-- Navigation -->
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592; Prev</button>
      <button class="nav-btn today-btn" onclick="goToday()">Today</button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next &#8594;</button>
    </div>
  </div>
</div>

<!-- Theme Picker Overlay -->
<div class="theme-overlay" id="themeOverlay" onclick="closeThemePicker(event)">
  <div class="theme-picker" onclick="event.stopPropagation()">
    <div class="theme-picker-header">
      <div class="theme-picker-title">Choose Theme</div>
      <button class="theme-close-btn" onclick="closeThemePicker()">✕</button>
    </div>
    <div class="theme-options">
      <button class="theme-option" data-theme="midnight" onclick="setTheme('midnight')">
        <span class="theme-swatch midnight-swatch"></span>
        <div class="theme-info">
          <span class="theme-name">Midnight</span>
          <span class="theme-desc">Purple & navy</span>
        </div>
        <svg class="theme-check" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      </button>
      <button class="theme-option" data-theme="ocean" onclick="setTheme('ocean')">
        <span class="theme-swatch ocean-swatch"></span>
        <div class="theme-info">
          <span class="theme-name">Ocean</span>
          <span class="theme-desc">Teal & blue</span>
        </div>
        <svg class="theme-check" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      </button>
      <button class="theme-option" data-theme="ember" onclick="setTheme('ember')">
        <span class="theme-swatch ember-swatch"></span>
        <div class="theme-info">
          <span class="theme-name">Ember</span>
          <span class="theme-desc">Warm & amber</span>
        </div>
        <svg class="theme-check" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      </button>
      <button class="theme-option" data-theme="forest" onclick="setTheme('forest')">
        <span class="theme-swatch forest-swatch"></span>
        <div class="theme-info">
          <span class="theme-name">Forest</span>
          <span class="theme-desc">Green & emerald</span>
        </div>
        <svg class="theme-check" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      </button>
      <button class="theme-option" data-theme="mono" onclick="setTheme('mono')">
        <span class="theme-swatch mono-swatch"></span>
        <div class="theme-info">
          <span class="theme-name">Mono</span>
          <span class="theme-desc">Clean grayscale</span>
        </div>
        <svg class="theme-check" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
      </button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>

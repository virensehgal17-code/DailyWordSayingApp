<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Night Tally</title>
    <meta name="description" content="A sleek drink and item counter for your night out.">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-midnight">
    <div class="app-container">
        <header class="header">
            <div class="header-top">
                <h1>Night Tally <span id="version-tag" style="font-size: 0.7rem; vertical-align: middle; opacity: 0.5;">v6</span></h1>
                <div class="theme-selector">
                    <button id="refresh-app-btn" class="refresh-btn" title="Force Update">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    </button>
                    <select id="theme-dropdown" aria-label="Select theme">
                        <option value="theme-midnight">Midnight</option>
                        <option value="theme-neon">Neon Glow</option>
                        <option value="theme-sunset">Sunset Vibes</option>
                        <option value="theme-ocean">Deep Ocean</option>
                    </select>
                </div>
            </div>
            <p>Keep track of your counts tonight</p>
            <div class="total-drinks-badge">Total Drinks: <span id="total-drinks-count">0</span></div>
        </header>

        <main class="tally-grid" id="tally-grid">
            <!-- Items will be generated here by JavaScript -->
        </main>

        <button class="add-item-btn" id="add-item-btn" aria-label="Add new item">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <span>Add Item</span>
        </button>
    </div>

    <!-- Add Item Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal-content glass-panel" id="modal-container">
            <div class="modal-header">
                <h2>Add Tracker</h2>
                <button class="close-modal-btn" id="cancel-add-btn" aria-label="Close">&times;</button>
            </div>
            
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="search" id="item-search" placeholder="Search drinks & items..." autocomplete="off">
            </div>

            <div class="catalog-container">
                <div class="catalog-list" id="catalog-list">
                    <!-- Catalog items generated by JS -->
                </div>
                
                <div class="custom-item-container hidden" id="custom-item-container">
                    <p class="custom-hint">Not found? Add it as a custom item:</p>
                    <div class="form-group check-group">
                        <label>
                            <input type="checkbox" id="is-drink" checked>
                            Count towards "Total Drinks"
                        </label>
                    </div>
                    <button class="btn btn-primary" id="confirm-add-btn">Add "<span id="custom-term"></span>"</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Register Service Worker for offline capability & auto-updates
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered', reg))
                    .catch(err => console.error('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
